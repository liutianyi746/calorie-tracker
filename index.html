<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234cd964%22/><text x=%2250%22 y=%2268%22 text-anchor=%22middle%22 font-size=%2256%22 fill=%22black%22>卡</text></svg>">
  <title>卡路里追踪</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

<!-- SVG Icon Library -->
<svg style="display:none" aria-hidden="true">
  <defs>
    <!-- Camera -->
    <g id="ic-camera"><rect x="2" y="6" width="20" height="15" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13.5" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="17" cy="9" r="1" fill="currentColor"/></g>
    <!-- Chart -->
    <g id="ic-chart"><rect x="3" y="14" width="4" height="7" rx="1" fill="currentColor"/><rect x="10" y="7" width="4" height="14" rx="1" fill="currentColor"/><rect x="17" y="10" width="4" height="11" rx="1" fill="currentColor"/></g>
    <!-- Spark -->
    <g id="ic-spark"><path d="M12 2l2 8h7l-5.5 4.5L18 21l-6-5-6 5 2.5-6.5L3 10h7z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></g>
    <!-- Settings Gear -->
    <g id="ic-gear"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 1v3m0 16v3M1 12h3m16 0h3M4.2 4.2l2.1 2.1m11.4 11.4l2.1 2.1M4.2 19.8l2.1-2.1m11.4-11.4l2.1-2.1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></g>
    <!-- Camera Lens (photo button) -->
    <g id="ic-lens"><rect x="2" y="5" width="20" height="15" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12.5" r="5" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12.5" r="2" fill="currentColor"/></g>
    <!-- Image (gallery button) -->
    <g id="ic-image"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="8.5" cy="9.5" r="2" fill="currentColor"/><path d="M3 16l5-5 3 3 4-4 6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Search (analyze) -->
    <g id="ic-search"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16.5 16.5L21 21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></g>
    <!-- Download -->
    <g id="ic-download"><path d="M12 3v12m-5-5l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v3h16v-3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Upload -->
    <g id="ic-upload"><path d="M12 20V8m-5 5l5-5 5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v3h16v-3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Chevron Left -->
    <g id="ic-chevron-left"><path d="M16 4L7 12l9 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Chevron Right -->
    <g id="ic-chevron-right"><path d="M8 4l9 8-9 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Plate (empty state) -->
    <g id="ic-plate"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.6"/></g>
    <!-- Trash -->
    <g id="ic-trash"><path d="M4 6h16M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6 6l1 14h10l1-14" fill="none" stroke="currentColor" stroke-width="1.8"/></g>
    <!-- Check -->
    <g id="ic-check"><path d="M5 13l4 4L19 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <!-- Warning -->
    <g id="ic-warning"><path d="M12 3L2 21h20z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 10v4M12 17.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
    <!-- Info -->
    <g id="ic-info"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v5M12 7.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
  </defs>
</svg>
<!-- End Icon Library -->

<main id="app">
  <!-- Tab 1: 拍照分析 -->
  <section id="tab-analyze" class="tab-page active">
    <div class="tab-header">
      <h1>拍照分析</h1>
      <button class="btn-settings" onclick="openSettings()" aria-label="设置">
        <svg width="22" height="22"><use href="#ic-gear"/></svg>
      </button>
    </div>
    <div class="tab-content">
      <div id="camera-area" class="camera-area">
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <input type="file" id="gallery-input" accept="image/*" hidden>
        <img id="photo-preview" class="photo-preview" style="display:none" alt="食物照片">
        <div class="capture-buttons">
          <button id="btn-capture" class="btn-capture">
            <span class="capture-icon"><svg width="28" height="28"><use href="#ic-lens"/></svg></span>
            <span>拍照</span>
          </button>
          <button id="btn-gallery" class="btn-capture">
            <span class="capture-icon"><svg width="28" height="28"><use href="#ic-image"/></svg></span>
            <span>相册</span>
          </button>
        </div>
      </div>
      <div class="input-group">
        <label for="food-desc">食物描述</label>
        <textarea id="food-desc" placeholder="例如：一碗白米饭（150g）+ 宫保鸡丁（约200g）" rows="3"></textarea>
      </div>
      <button id="btn-analyze" class="btn-primary" disabled>
        <svg width="18" height="18" style="vertical-align:middle;margin-right:6px;margin-top:-2px"><use href="#ic-search"/></svg>分析营养成分
      </button>
      <div id="result-container" class="result-container" style="display:none"></div>
    </div>
  </section>

  <!-- Tab 2: 历史记录 -->
  <section id="tab-history" class="tab-page">
    <div class="tab-header">
      <h1>历史记录</h1>
    </div>
    <div class="tab-content">
      <div class="date-picker" id="date-picker">
        <button id="btn-prev-day" class="btn-icon"><svg width="16" height="16"><use href="#ic-chevron-left"/></svg></button>
        <button id="btn-date-display" class="btn-date-display"></button>
        <button id="btn-next-day" class="btn-icon"><svg width="16" height="16"><use href="#ic-chevron-right"/></svg></button>
      </div>
      <div id="history-list" class="history-list"></div>
      <div class="export-area">
        <button id="btn-export" class="btn-outline">
          <svg width="16" height="16" style="vertical-align:middle;margin-right:6px;margin-top:-2px"><use href="#ic-download"/></svg>导出数据
        </button>
        <button id="btn-import" class="btn-outline" style="margin-top:8px;">
          <svg width="16" height="16" style="vertical-align:middle;margin-right:6px;margin-top:-2px"><use href="#ic-upload"/></svg>导入数据
        </button>
      </div>
    </div>
  </section>

  <!-- Tab 3: 个性化建议 -->
  <section id="tab-advice" class="tab-page">
    <div class="tab-header">
      <h1>个性化建议</h1>
    </div>
    <div class="tab-content">
      <button id="btn-generate-advice" class="btn-primary">
        <svg width="18" height="18" style="vertical-align:middle;margin-right:6px;margin-top:-2px"><use href="#ic-spark"/></svg>生成最新建议
      </button>
      <div id="advice-container" class="advice-container" style="display:none"></div>
    </div>
  </section>
</main>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="analyze">
    <span class="nav-icon"><svg width="22" height="22"><use href="#ic-camera"/></svg></span>
    <span class="nav-label">拍照</span>
  </button>
  <button class="nav-item" data-tab="history">
    <span class="nav-icon"><svg width="22" height="22"><use href="#ic-chart"/></svg></span>
    <span class="nav-label">记录</span>
  </button>
  <button class="nav-item" data-tab="advice">
    <span class="nav-icon"><svg width="22" height="22"><use href="#ic-spark"/></svg></span>
    <span class="nav-label">建议</span>
  </button>
</nav>

<!-- Toast -->
<div id="toast" class="toast" style="display:none"></div>

<!-- Loading -->
<div id="loading" class="loading-overlay" style="display:none">
  <div class="spinner"></div>
  <p>AI 正在分析中…</p>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal" style="display:none">
  <div class="modal-content">
    <h2>
      <svg width="20" height="20" style="vertical-align:middle;margin-right:6px;margin-top:-3px"><use href="#ic-gear"/></svg>设置
    </h2>
    <div class="form-group">
      <label for="api-key-input">DeepSeek API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-...">
    </div>
    <div class="form-group">
      <label for="calorie-target">每日热量目标 (kcal)</label>
      <input type="number" id="calorie-target" value="1800" min="500" max="5000">
    </div>
    <div class="form-group">
      <label for="protein-target">蛋白质目标 (g)</label>
      <input type="number" id="protein-target" value="60" min="20" max="300">
    </div>
    <div class="form-group">
      <label for="fat-target">脂肪目标 (g)</label>
      <input type="number" id="fat-target" value="65" min="10" max="300">
    </div>
    <div class="form-group">
      <label for="carbs-target">碳水目标 (g)</label>
      <input type="number" id="carbs-target" value="180" min="20" max="500">
    </div>
    <div class="modal-actions">
      <button id="btn-save-settings" class="btn-primary">保存</button>
      <button id="btn-close-settings" class="btn-outline">取消</button>
    </div>
  </div>
</div>

<script src="js/bundle.js?v=5"></script>
<script>
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
